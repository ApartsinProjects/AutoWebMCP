<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#111b3d"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow1" cx="600" cy="200" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="300" cy="250" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow3" cx="900" cy="200" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="520" y1="200" x2="680" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Tool block gradient -->
    <linearGradient id="toolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>
  <rect width="1200" height="400" fill="url(#glow3)"/>

  <!-- ==================== LEFT SIDE: Browser Automation (Old Way) ==================== -->

  <!-- Browser window frame -->
  <g opacity="0.6">
    <rect x="60" y="80" width="280" height="200" rx="8" fill="#1a1f3a" stroke="#334155" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="60" y="80" width="280" height="28" rx="8" fill="#1e2642"/>
    <rect x="60" y="100" width="280" height="8" fill="#1e2642"/>
    <!-- Window dots -->
    <circle cx="78" cy="94" r="4" fill="#ef4444" opacity="0.7"/>
    <circle cx="92" cy="94" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="106" cy="94" r="4" fill="#22c55e" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="120" y="87" width="140" height="14" rx="3" fill="#0f172a" opacity="0.6"/>

    <!-- Screenshot indicators (stacked rectangles) -->
    <rect x="80" y="120" width="100" height="60" rx="3" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
    <rect x="85" y="125" width="100" height="60" rx="3" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.35"/>
    <rect x="90" y="130" width="100" height="60" rx="3" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.2"/>

    <!-- Camera icon on screenshot -->
    <circle cx="130" cy="150" r="12" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.6"/>
    <circle cx="130" cy="150" r="5" fill="#ef4444" opacity="0.3"/>

    <!-- Mouse cursors scattered -->
    <g opacity="0.5" fill="#94a3b8">
      <path d="M220 140 l0 16 l5 -5 l4 8 l3 -1.5 l-4 -8 l7 -1z" />
      <path d="M260 170 l0 16 l5 -5 l4 8 l3 -1.5 l-4 -8 l7 -1z" />
      <path d="M200 210 l0 16 l5 -5 l4 8 l3 -1.5 l-4 -8 l7 -1z" />
    </g>

    <!-- Coordinate labels -->
    <text x="225" y="137" font-family="monospace" font-size="8" fill="#ef4444" opacity="0.5">[672,195]</text>
    <text x="245" y="195" font-family="monospace" font-size="8" fill="#ef4444" opacity="0.5">[x,y]</text>

    <!-- Red X marks showing fragility -->
    <g stroke="#ef4444" stroke-width="1.5" opacity="0.4">
      <line x1="270" y1="130" x2="280" y2="140"/>
      <line x1="280" y1="130" x2="270" y2="140"/>
      <line x1="290" y1="220" x2="300" y2="230"/>
      <line x1="300" y1="220" x2="290" y2="230"/>
    </g>
  </g>

  <!-- "screenshot()" labels -->
  <text x="100" y="300" font-family="monospace" font-size="10" fill="#ef4444" opacity="0.4">screenshot()</text>
  <text x="80" y="315" font-family="monospace" font-size="10" fill="#ef4444" opacity="0.4">click([672,195])</text>
  <text x="110" y="330" font-family="monospace" font-size="10" fill="#ef4444" opacity="0.4">screenshot()</text>

  <!-- Slow indicator -->
  <text x="200" y="350" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.5">~12s, fragile</text>

  <!-- ==================== CENTER: Transformation Arrow ==================== -->

  <!-- Central beam -->
  <g filter="url(#strongGlow)">
    <line x1="420" y1="200" x2="780" y2="200" stroke="url(#arrowGrad)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Arrow body with particles -->
  <g filter="url(#softGlow)">
    <!-- Main arrow -->
    <path d="M 440 200 L 560 200" stroke="#f59e0b" stroke-width="2.5" opacity="0.8"/>
    <path d="M 640 200 L 760 200" stroke="#22d3ee" stroke-width="2.5" opacity="0.8"/>

    <!-- Arrow head -->
    <path d="M 750 190 L 770 200 L 750 210" stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.8"/>
  </g>

  <!-- Central icon: Lightning bolt / transform -->
  <g transform="translate(600, 200)" filter="url(#strongGlow)">
    <circle r="28" fill="#111b3d" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
    <!-- Lightning bolt -->
    <path d="M -6 -14 L 2 -2 L -3 -2 L 6 14 L -2 2 L 3 2 Z" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Floating particles along the beam -->
  <g opacity="0.5">
    <circle cx="470" cy="195" r="2" fill="#f59e0b"/>
    <circle cx="500" cy="205" r="1.5" fill="#f59e0b"/>
    <circle cx="530" cy="198" r="1" fill="#f59e0b"/>
    <circle cx="670" cy="203" r="1" fill="#22d3ee"/>
    <circle cx="700" cy="196" r="1.5" fill="#22d3ee"/>
    <circle cx="730" cy="202" r="2" fill="#22d3ee"/>
  </g>

  <!-- ==================== RIGHT SIDE: MCP Tools (New Way) ==================== -->

  <!-- Tool blocks -->
  <g filter="url(#softGlow)">
    <!-- Tool 1 -->
    <rect x="840" y="90" width="180" height="34" rx="6" fill="url(#toolGrad)" stroke="#22d3ee" stroke-width="1.2" opacity="0.9"/>
    <circle cx="858" cy="107" r="6" fill="#22d3ee" opacity="0.3"/>
    <text x="870" y="112" font-family="monospace" font-size="12" fill="#22d3ee" font-weight="bold">set_page_title()</text>

    <!-- Tool 2 -->
    <rect x="860" y="136" width="200" height="34" rx="6" fill="url(#toolGrad)" stroke="#6366f1" stroke-width="1.2" opacity="0.9"/>
    <circle cx="878" cy="153" r="6" fill="#6366f1" opacity="0.3"/>
    <text x="890" y="158" font-family="monospace" font-size="12" fill="#a5b4fc" font-weight="bold">insert_text_box()</text>

    <!-- Tool 3 -->
    <rect x="850" y="182" width="190" height="34" rx="6" fill="url(#toolGrad)" stroke="#22d3ee" stroke-width="1.2" opacity="0.9"/>
    <circle cx="868" cy="199" r="6" fill="#22d3ee" opacity="0.3"/>
    <text x="880" y="204" font-family="monospace" font-size="12" fill="#22d3ee" font-weight="bold">add_page()</text>

    <!-- Tool 4 -->
    <rect x="870" y="228" width="180" height="34" rx="6" fill="url(#toolGrad)" stroke="#6366f1" stroke-width="1.2" opacity="0.9"/>
    <circle cx="888" cy="245" r="6" fill="#6366f1" opacity="0.3"/>
    <text x="900" y="250" font-family="monospace" font-size="12" fill="#a5b4fc" font-weight="bold">set_theme()</text>

    <!-- Tool 5 -->
    <rect x="855" y="274" width="195" height="34" rx="6" fill="url(#toolGrad)" stroke="#22d3ee" stroke-width="1.2" opacity="0.9"/>
    <circle cx="873" cy="291" r="6" fill="#22d3ee" opacity="0.3"/>
    <text x="885" y="296" font-family="monospace" font-size="12" fill="#22d3ee" font-weight="bold">insert_button()</text>
  </g>

  <!-- Checkmarks -->
  <g stroke="#22c55e" stroke-width="1.8" fill="none" opacity="0.7">
    <path d="M1045 102 l4 5 l8 -10"/>
    <path d="M1065 148 l4 5 l8 -10"/>
    <path d="M1055 194 l4 5 l8 -10"/>
    <path d="M1060 240 l4 5 l8 -10"/>
    <path d="M1058 286 l4 5 l8 -10"/>
  </g>

  <!-- Fast indicator -->
  <text x="900" y="340" font-family="monospace" font-size="11" fill="#22d3ee" opacity="0.5">~0.5s, reliable</text>

  <!-- ==================== Title ==================== -->

  <g filter="url(#softGlow)">
    <text x="600" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="2">
      Auto<tspan fill="#6366f1">Web</tspan><tspan fill="#22d3ee">MCP</tspan>
    </text>
  </g>

  <text x="600" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="1">
    Teach Claude a web app once. Use it forever.
  </text>

  <!-- ==================== Bottom labels ==================== -->

  <text x="200" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">Computer Use</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" letter-spacing="0.5" opacity="0.7">learn-webapp</text>
  <text x="960" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">MCP Tools</text>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="399" rx="0" fill="none" stroke="#1e293b" stroke-width="1"/>
</svg>